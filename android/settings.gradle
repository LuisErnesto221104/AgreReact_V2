pluginManagement { includeBuild("../node_modules/@react-native/gradle-plugin") }
plugins { id("com.facebook.react.settings") }

def nodeBinary = System.getenv("NODE_BINARY")
if (nodeBinary == null || nodeBinary.trim().isEmpty()) {
	nodeBinary = org.gradle.internal.os.OperatingSystem.current().isWindows() ? "node.exe" : "node"
}

def reactNativeCli = new File(rootDir, "../node_modules/react-native/cli.js").absolutePath
extensions.configure(com.facebook.react.ReactSettingsExtension){ ex ->
	ex.autolinkLibrariesFromCommand([nodeBinary, reactNativeCli, "config"])
}
rootProject.name = 'AgroAppReact'
include ':app'
includeBuild('../node_modules/@react-native/gradle-plugin')
